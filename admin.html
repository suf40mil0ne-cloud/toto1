<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>관리자 | 로또리듬</title>
  <meta name="robots" content="noindex, nofollow"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#006c49",
            "primary-light": "#10b981",
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Inter', 'IBM Plex Sans KR', sans-serif; }
    .ball {
      width: 30px; height: 30px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 800; color: white; margin: 2px; font-size: 0.75rem;
      box-shadow: inset -1px -1px 3px rgba(0,0,0,0.15);
    }
    .badge-rank {
      padding: 2px 10px; border-radius: 999px;
      font-size: 0.7rem; font-weight: 700; white-space: nowrap;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/" class="text-sm text-gray-400 hover:text-gray-600 transition-colors">← 메인</a>
        <span class="text-gray-200">|</span>
        <span class="font-bold text-gray-800">관리자 대시보드</span>
      </div>
      <div id="user-info" class="hidden items-center gap-3">
        <span id="user-email" class="text-xs text-gray-500"></span>
        <button id="signout-btn" class="text-xs px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors text-gray-600">로그아웃</button>
      </div>
    </div>
  </header>

  <!-- Login Section -->
  <section id="login-section" class="min-h-[calc(100vh-56px)] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-10 w-full max-w-sm text-center">
      <div class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
        <svg class="w-7 h-7 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold mb-2">관리자 로그인</h1>
      <p class="text-sm text-gray-500 mb-8 leading-relaxed">인가된 Google 계정으로만 접근할 수 있습니다.</p>

      <div id="login-error" class="hidden mb-4 p-3 bg-red-50 border border-red-100 rounded-xl text-sm text-red-600"></div>
      <div id="config-error" class="hidden mb-4 p-3 bg-amber-50 border border-amber-100 rounded-xl text-sm text-amber-700"></div>

      <button id="google-signin-btn" class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-white border-2 border-gray-200 rounded-xl font-semibold text-gray-700 hover:border-primary hover:text-primary transition-all active:scale-95 shadow-sm">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google 계정으로 로그인
      </button>
    </div>
  </section>

  <!-- Dashboard Section -->
  <section id="dashboard-section" class="hidden max-w-6xl mx-auto px-4 py-8">

    <!-- Stats Summary -->
    <div id="stats-bar" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-xl border border-gray-200 p-4 text-center">
        <div id="stat-draws" class="text-2xl font-bold text-primary">-</div>
        <div class="text-xs text-gray-500 mt-1">총 회차</div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-4 text-center">
        <div id="stat-sessions" class="text-2xl font-bold text-primary">-</div>
        <div class="text-xs text-gray-500 mt-1">총 세션</div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-4 text-center">
        <div id="stat-sets" class="text-2xl font-bold text-primary">-</div>
        <div class="text-xs text-gray-500 mt-1">총 번호 세트</div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-4 text-center">
        <div id="stat-ranked" class="text-2xl font-bold text-amber-500">-</div>
        <div class="text-xs text-gray-500 mt-1">당첨 세트 (5등+)</div>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-16 text-gray-400">
      <div class="inline-block w-8 h-8 border-4 border-primary/30 border-t-primary rounded-full animate-spin mb-4"></div>
      <p>데이터 불러오는 중...</p>
    </div>

    <!-- Draws Container -->
    <div id="draws-container"></div>

  </section>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-auth-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
